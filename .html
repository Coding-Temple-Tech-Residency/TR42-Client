<!DOCTYPE html>
<html>
<head>
  <title>Messaging App</title>
  <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial; display: flex; height: 100vh; }

    .sidebar {
      width: 250px;
      background: #1e1e2f;
      color: white;
      padding: 10px;
    }

    .user {
      padding: 10px;
      cursor: pointer;
    }

    .user:hover { background: #333; }

    .chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      background: #f4f4f4;
    }

    .message {
      background: white;
      padding: 8px;
      margin: 5px 0;
      border-radius: 5px;
    }

    .own {
      background: #4a4aff;
      color: white;
      text-align: right;
    }

    .input-area {
      display: flex;
      padding: 10px;
    }

    input { flex: 1; padding: 10px; }
    button { padding: 10px; }
  </style>
</head>

<body>

<div class="sidebar">
  <h3>Users</h3>
  <div class="user" onclick="selectUser('Vendor A')">Vendor A</div>
  <div class="user" onclick="selectUser('Vendor B')">Vendor B</div>
  <div class="user" onclick="selectUser('Vendor B')">Vendor C</div>
  <div class="user" onclick="selectUser('Vendor B')">Vendor D</div>
</div>

<div class="chat">
  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const socket = io();
  let currentUser = prompt("Enter username:");
  let selectedUser = "Vendor A";

  socket.emit("join", currentUser);

  function selectUser(user) {
    selectedUser = user;
  }

  function sendMessage() {
    const input = document.getElementById("msg");
    const text = input.value;

    const msgData = {
      sender: currentUser,
      receiver: selectedUser,
      text: text,
      time: new Date().toLocaleTimeString()
    };

    socket.emit("send_message", msgData);
    input.value = "";
  }

  socket.on("receive_message", (data) => {
    const messages = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = data.sender === currentUser ? "message own" : "message";

    div.innerHTML = `<b>${data.sender}:</b> ${data.text} <small>${data.time}</small>`;
    messages.appendChild(div);

    messages.scrollTop = messages.scrollHeight;
  });
</script>

</body>
</html>
