<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Messaging Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      height: 600px;
      background: white;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .chat-header {
      background: #4a90e2;
      color: white;
      padding: 15px;
      font-size: 18px;
    }

    .chat-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .message {
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
      max-width: 70%;
    }

    .sent {
      background: #4a90e2;
      color: white;
      margin-left: auto;
    }

    .received {
      background: #e0e0e0;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ddd;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    .chat-input button {
      padding: 10px 15px;
      border: none;
      background: #4a90e2;
      color: white;
      cursor: pointer;
    }

    .chat-input button:hover {
      background: #357abd;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">Messaging</div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input">
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  function sendMessage() {
    const input = document.getElementById("messageInput");
    const messageText = input.value.trim();

    if (messageText === "") return;

    const messagesDiv = document.getElementById("messages");

    const message = document.createElement("div");
    message.classList.add("message", "sent");
    message.textContent = messageText;

    messagesDiv.appendChild(message);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    input.value = "";

    // Simulated reply
    setTimeout(() => {
      const reply = document.createElement("div");
      reply.classList.add("message", "received");
      reply.textContent = "Auto reply: " + messageText;

      messagesDiv.appendChild(reply);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }, 1000);
  }
</script>

</body>
</html>
